<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translator</title>
<style>
body{
font-family:Arial;
max-width:500px;
margin:30px auto;
padding:20px;
}
.topbar{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:10px;
}

.topbar h2{
margin:0;
font-size:28px;
}

.miniBtn{
padding:6px 12px;
font-size:14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#4CAF50;
color:white;
}
.miniBtn:hover{
opacity:0.9;
}
textarea{
width:100%;
height:100px;
font-size:22px;
padding:10px;
}
button{
padding:10px 15px;
font-size:18px;
margin-top:8px;
margin-right:5px;
cursor:pointer;
}
.result{
margin-top:20px;
padding:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:20px;
}
.history{
margin-top:20px;
font-size:16px;
}
.history div{
cursor:pointer;
padding:5px;
border-bottom:1px solid #ddd;
}
.smallBtn{
padding:5px 8px;
font-size:9px;
margin-top:4px;
margin-right:3px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="topbar">
<h2>🌍 Multi Translator</h2>
<button class="miniBtn" onclick="translateText()">번역</button>
</div>

<textarea id="inputText" placeholder="영어 또는 한국어 입력"></textarea>

<div class="result">

<p>EN: <span id="en"></span></p>
<button class="smallBtn" onclick="copyText('en')">⧉</button>
<button class="smallBtn" onclick="speakText('en','en-US')">🔊</button>

<p>FR: <span id="fr"></span></p>
<button class="smallBtn" onclick="copyText('fr')">⧉</button>
<button class="smallBtn" onclick="speakText('fr','fr-FR')">🔊</button>

<p>DE: <span id="de"></span></p>
<button class="smallBtn" onclick="copyText('de')">⧉</button>
<button class="smallBtn" onclick="speakText('de','de-DE')">🔊</button>

<p>IT: <span id="it"></span></p>
<button class="smallBtn" onclick="copyText('it')">⧉</button>
<button class="smallBtn" onclick="speakText('it','it-IT')">🔊</button>

<p>KO: <span id="ko"></span></p>
<button class="smallBtn" onclick="copyText('ko')">⧉</button>
<button class="smallBtn" onclick="speakText('ko','ko-KR')">🔊</button>

</div>

<div class="history">
<h3>최근 입력</h3>
<div id="historyList"></div>
</div>

<script>
let timer;

async function translate(target,text){
const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;
const res=await fetch(url);
const data=await res.json();
return data[0].map(item=>item[0]).join('');
}

async function translateText(){
const text=document.getElementById("inputText").value;
if(!text.trim()) return;

saveHistory(text);

try{
document.getElementById("en").innerText=await translate("en",text);
document.getElementById("fr").innerText=await translate("fr",text);
document.getElementById("de").innerText=await translate("de",text);
document.getElementById("it").innerText=await translate("it",text);
document.getElementById("ko").innerText=await translate("ko",text);
}catch(e){
document.getElementById("en").innerText="오류";
document.getElementById("fr").innerText="오류";
document.getElementById("de").innerText="오류";
document.getElementById("it").innerText="오류";
document.getElementById("ko").innerText="오류";
}
}

function copyText(id){
navigator.clipboard.writeText(document.getElementById(id).innerText);
}

function speakText(id,lang){
const text=document.getElementById(id).innerText;
const utterance=new SpeechSynthesisUtterance(text);
utterance.lang=lang;
speechSynthesis.speak(utterance);
}

document.getElementById("inputText").addEventListener("keydown",function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
translateText();
}
});

document.getElementById("inputText").addEventListener("input",function(){
clearTimeout(timer);
timer=setTimeout(()=>{
translateText();
},700);
});

function saveHistory(text){
let history=JSON.parse(localStorage.getItem("history"))||[];
history.unshift(text);
history=[...new Set(history)].slice(0,10);
localStorage.setItem("history",JSON.stringify(history));
renderHistory();
}

function renderHistory(){
let history=JSON.parse(localStorage.getItem("history"))||[];
document.getElementById("historyList").innerHTML=
history.map(item=>`<div onclick="useHistory('${item}')">${item}</div>`).join('');
}

function useHistory(text){
document.getElementById("inputText").value=text;
translateText();
}

renderHistory();
</script>

</body>
</html>
