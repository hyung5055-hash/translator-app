<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translator</title>
<style>
body{
font-family:Arial;
max-width:500px;
margin:30px auto;
padding:20px;
}
textarea{
width:100%;
height:120px;
font-size:22px;
padding:10px;
}
button{
width:100%;
padding:15px;
font-size:22px;
margin-top:15px;
cursor:pointer;
}
.result{
margin-top:20px;
padding:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:20px;
}
.copybtn{
margin-top:5px;
padding:6px 10px;
font-size:16px;
width:auto;
}
</style>
</head>
<body>

<h2>🌍 Multi Translator</h2>

<textarea id="inputText" placeholder="영어 또는 한국어 입력"></textarea>

<button onclick="translateText()">번역하기</button>

<div class="result">
<p>FR: <span id="fr"></span></p>
<button class="copybtn" onclick="copyText('fr')">복사</button>

<p>DE: <span id="de"></span></p>
<button class="copybtn" onclick="copyText('de')">복사</button>

<p>IT: <span id="it"></span></p>
<button class="copybtn" onclick="copyText('it')">복사</button>
</div>

<script>
async function translate(target,text){
const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;

const res=await fetch(url);
const data=await res.json();
return data[0].map(item=>item[0]).join('');
}

async function translateText(){
const text=document.getElementById("inputText").value;

try{
document.getElementById("fr").innerText=await translate("fr",text);
document.getElementById("de").innerText=await translate("de",text);
document.getElementById("it").innerText=await translate("it",text);
}catch(e){
document.getElementById("fr").innerText="오류";
document.getElementById("de").innerText="오류";
document.getElementById("it").innerText="오류";
}
}

function copyText(id){
navigator.clipboard.writeText(document.getElementById(id).innerText);
}
</script>

</body>
</html>
